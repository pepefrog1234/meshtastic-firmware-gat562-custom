; ──────────────────────────────────────────────────────────────────
; GAT562 30S Mesh KIT V1.1
; ──────────────────────────────────────────────────────────────────
; Module:  gat562_SOx  (nRF52840 + SX1262 combo)
; IO-compatible with RAK4631 — reuses wiscore_rak4631 board JSON.
;
; On-board: 5-way nav switch, WS2812B NeoPixel, BME280, u-blox GPS,
;           passive buzzer, 18650 battery, USB-C
;
; External SPI1 / QSPI pins are occupied by the 5-way switch, so
; there is no external flash and no e-ink display support.
;
; hw_model 255 = PRIVATE_HW  (change to an official ID if/when the
; board is accepted upstream into the Meshtastic device list).
; ──────────────────────────────────────────────────────────────────

[env:gat562_30s]
custom_meshtastic_hw_model = 255
custom_meshtastic_hw_model_slug = GAT562_30S
custom_meshtastic_architecture = nrf52840
custom_meshtastic_actively_supported = false
custom_meshtastic_support_level = 3
custom_meshtastic_display_name = GAT562 30S Mesh KIT

extends = nrf52840_base
board = wiscore_rak4631
build_flags = ${nrf52840_base.build_flags}
  -I variants/nrf52840/gat562_30s
  -D GAT562_30S
  ; Use NFC pins P0.09 / P0.10 as regular GPIOs
  ; (P0.09 = U_KEY button; P0.10 is available as spare GPIO)
  -D CONFIG_NFCT_PINS_AS_GPIOS=1
  ; Only SX1262 LoRa — exclude unused radio drivers
  -DRADIOLIB_EXCLUDE_SX128X=1
  -DRADIOLIB_EXCLUDE_SX127X=1
  -DRADIOLIB_EXCLUDE_LR11X0=1
  ; No e-ink display
  -DMESHTASTIC_USE_EINK_UI=0

build_src_filter = ${nrf52_base.build_src_filter}
  +<../variants/nrf52840/gat562_30s>

lib_deps =
  ${nrf52840_base.lib_deps}
